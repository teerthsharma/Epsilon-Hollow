agent:
  name: "Omega-1"
  memory_capacity: 1000000000  # Vector embedding limits
  reasoning_mode: "hybrid"     # symbolic + neural

hardware:
  sharding_strategy: "tensor_parallel"
  vram_allocation_gb: 256

safety:
  constitutional_alignment: true
  alignment_threshold: 0.99
  max_tool_execution_time_sec: 10
  # NOTE: This scope is ASPIRATIONAL and NOT currently enforced by
  # infrastructure/tools/python_executor.py (UnsafePythonExecutor).
  # The executor uses cwd= but does not jail filesystem access.
  # Real enforcement requires container/namespace/seccomp isolation.
  allowed_filesystem_scope: "/sandbox/"  # NOT ENFORCED — see note above

training:
  meta_learning_rate: 0.0001
  evolutionary_batch_size: 16
