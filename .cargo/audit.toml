# Advisories to ignore — transitive deps from optional features (pyo3, reqwest)
# not used in the core Seal OS / epsilon-os runtime.

[advisories]
ignore = [
    "RUSTSEC-2024-0436", # paste - unmaintained (transitive via pyo3)
    "RUSTSEC-2025-0020", # pyo3 - optional python bindings, not used at runtime
    "RUSTSEC-2025-0119", # number_prefix - unmaintained (transitive)
    "RUSTSEC-2025-0134", # paste - unmaintained (transitive via pyo3)
    "RUSTSEC-2026-0098", # rustls-webpki - transitive via reqwest (optional net feature)
    "RUSTSEC-2026-0099", # rustls-webpki - transitive via reqwest (optional net feature)
    "RUSTSEC-2026-0104", # rustls-webpki - transitive via reqwest (optional net feature)
]
