[engine]
name = "Aether-Lang"
category = "Runtime"
icon = "zap"
color = "#00E676"
description = "Topology programming language with Lean 4 verified kernel"

[engine.entry]
type = "native"
command = "laamba-native aether-lang"
working_dir = "~/repos/Aether-Lang"

[engine.inputs]
script = { type = "file" }

[engine.outputs]
result = { type = "scalar" }
