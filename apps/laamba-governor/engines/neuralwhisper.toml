[engine]
name = "NeuralWhisper"
category = "Audio"
icon = "audio-waveform"
color = "#FF4081"
description = "82M-param neural TTS running 100% in browser"

[engine.entry]
type = "native"
command = "laamba-native neuralwhisper"
working_dir = "~/repos/neuralwhisper"

[engine.inputs]
text = { type = "string" }
voice = { type = "string", default = "default" }

[engine.outputs]
audio = { type = "file" }
