[engine]
name = "Phi-Mem"
category = "Memory"
icon = "database"
color = "#B0BEC5"
description = "Barcode-signature content-addressable storage"

[engine.entry]
type = "native"
command = "laamba-native phi-mem"
working_dir = "~/repos/phi-mem"

[engine.inputs]
text = { type = "string" }

[engine.outputs]
barcode = { type = "scalar" }
entry = { type = "file" }
