# cargo-deny configuration for Epsilon-Hollow
# https://github.com/EmbarkStudios/cargo-deny

[graph]
all-features = false
no-default-features = false

[advisories]
# Advisory vulnerability scanning is handled by the dedicated `cargo audit`
# CI job. We disable DB fetching here because cargo-deny's bundled parser
# cannot handle CVSS 4.0 entries now present in the RustSec advisory-db.
db-urls = []
yanked = "deny"
ignore = [
    # paste is unmaintained but pulled transitively via nalgebra -> simba -> paste
    "RUSTSEC-2024-0436",
    # number_prefix unmaintained — transitive dep, no action available
    "RUSTSEC-2025-0119",
    # pyo3 buffer overflow — only affects optional python feature
    "RUSTSEC-2025-0020",
    # rustls-pemfile unmaintained — transitive via reqwest (optional net feature)
    "RUSTSEC-2025-0134",
    # webpki URI name constraints — transitive via reqwest
    "RUSTSEC-2026-0098",
    # webpki wildcard name constraints — transitive via reqwest
    "RUSTSEC-2026-0099",
    # webpki-related — transitive via reqwest
    "RUSTSEC-2026-0104",
]

[licenses]
# Workspace ships under MIT. Dependencies must use permissive licenses.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    # NOTE: Copyleft licenses (GPL-* LGPL-*) are intentionally banned.
]
confidence-threshold = 0.9
exceptions = [
    # wav v1.0.1 (transitive via candle-transformers -> tokenizers -> spm_precompiled)
    # is LGPL-3.0. We do not use it directly; it is pulled in for audio model support
    # in the aether-lang REPL. This exception is scoped to the specific crate.
    { allow = ["LGPL-3.0"], name = "wav", version = "*" },
]

[licenses.private]
ignore = true
registries = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
