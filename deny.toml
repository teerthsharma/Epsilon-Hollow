# cargo-deny configuration for Epsilon-Hollow
# https://github.com/EmbarkStudios/cargo-deny

[graph]
all-features = false
no-default-features = false

[advisories]
# Advisory vulnerability scanning is handled by the dedicated `cargo audit`
# CI job. We disable DB fetching here because cargo-deny's bundled parser
# cannot handle CVSS 4.0 entries now present in the RustSec advisory-db.
db-urls = []
yanked = "deny"
ignore = [
    # paste is unmaintained (RUSTSEC-2024-0436) but pulled transitively via
    # nalgebra -> simba -> paste. No action available until nalgebra migrates.
    "RUSTSEC-2024-0436",
]

[licenses]
# Workspace ships under LicenseRef-Epsilon-Hollow (custom attribution license).
# Dependencies must use permissive licenses; GPL/AGPL/LGPL are blocked.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.9
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
