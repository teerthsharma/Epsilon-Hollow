name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: cargo fmt --workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy --workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test --workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  bench-compile:
    name: cargo bench --no-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - run: cargo bench --workspace --no-run

  miri:
    name: miri (UB detection)
    runs-on: ubuntu-latest
    continue-on-error: false
    env:
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: cargo miri setup
        run: cargo +nightly miri setup
      - name: cargo miri test (aether-core state + os)
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation"
        run: |
          cargo +nightly miri test -p aether-core --features force-soft-floats --lib state::tests
          cargo +nightly miri test -p aether-core --features force-soft-floats --lib os::tests
          cargo +nightly miri test -p aether-core --features force-soft-floats --test proptest_os

  bench-regression:
    name: bench regression gate (io_cycle_8_lbas)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - name: Run criterion bench
        shell: bash
        run: |
          cargo bench --bench io_cycle --manifest-path kernel/aether/aether-link/Cargo.toml 2>&1 | tee bench.txt
      - name: Gate on io_cycle_8_lbas median ns/iter
        shell: bash
        run: |
          set -euo pipefail
          # Criterion 0.5 output: "io_cycle_8_lbas    time:   [44.123 ns 45.234 ns 46.345 ns]"
          line=$(grep -E 'io_cycle_8_lbas' bench.txt | grep 'time:' | head -n1)
          if [ -z "$line" ]; then
            echo "Could not find io_cycle_8_lbas timing line in bench.txt"
            cat bench.txt
            exit 1
          fi
          # Extract the median (middle value) from "[low median high]"
          ns=$(echo "$line" | sed -E 's/.*\[.*[[:space:]]([0-9]+(\.[0-9]+)?)[[:space:]]ns.*/\1/' | head -n1)
          ns_int=${ns%.*}
          echo "io_cycle_8_lbas median = $ns ns/iter"
          threshold=120
          if [ "$ns_int" -gt "$threshold" ]; then
            echo "REGRESSION: io_cycle_8_lbas = $ns ns/iter > threshold $threshold ns/iter"
            exit 1
          fi
          echo "OK: io_cycle_8_lbas = $ns ns/iter <= $threshold ns/iter"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: io-cycle-bench
          path: bench.txt

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - name: Install cargo-audit (locked to avoid MSRV-incompatible deps)
        run: cargo install cargo-audit --locked
      - run: cargo audit

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  docs:
    name: cargo doc -D warnings
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps

  bom:
    name: no UTF-8 BOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run BOM check
        shell: bash
        run: |
          chmod +x scripts/check_no_bom.sh
          ./scripts/check_no_bom.sh

  python:
    name: python compileall + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install minimal Python deps (numpy only; torch tests are skipUnless)
        run: python -m pip install --upgrade pip && python -m pip install numpy
      - name: compileall (syntax check)
        run: python -m compileall -q infrastructure scripts tests kernel/epsilon/epsilon_core
      - name: Run unittest discovery
        run: python -m unittest discover -s tests -p 'test_*.py' -v

  kernel-build:
    name: Build Seal OS kernel (nightly)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: kernel/seal-os
      - name: Build kernel (release)
        working-directory: kernel/seal-os
        run: cargo +nightly build --release
      - name: Verify kernel binary exists and size
        working-directory: kernel/seal-os
        run: |
          BINARY=target/x86_64-unknown-none/release/seal-os
          if [ ! -f "$BINARY" ]; then
            echo "FAIL: kernel binary not found at $BINARY"
            exit 1
          fi
          SIZE=$(stat --format=%s "$BINARY")
          echo "Kernel binary size: $SIZE bytes ($(du -h $BINARY | cut -f1))"
          MAX_SIZE=$((512 * 1024))
          if [ "$SIZE" -gt "$MAX_SIZE" ]; then
            echo "FAIL: kernel exceeds 512KB ($SIZE bytes)"
            exit 1
          fi
          echo "OK: kernel size within 512KB limit"
      - name: Build kernel (debug)
        working-directory: kernel/seal-os
        run: cargo +nightly build

  kernel-iso:
    name: Build Seal OS ISO
    runs-on: ubuntu-latest
    needs: kernel-build
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: kernel/seal-os
      - name: Install GRUB and ISO tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            grub-pc-bin grub-common xorriso mtools
      - name: Build kernel
        working-directory: kernel/seal-os
        run: cargo +nightly build --release
      - name: Create bootable ISO
        working-directory: kernel/seal-os
        run: |
          mkdir -p iso/boot/grub
          cp target/x86_64-unknown-none/release/seal-os iso/boot/kernel.bin
          cp boot/grub/grub.cfg iso/boot/grub/grub.cfg
          grub-mkrescue -o seal-os.iso iso/
      - name: Verify ISO
        working-directory: kernel/seal-os
        run: |
          if [ ! -f seal-os.iso ]; then
            echo "FAIL: ISO not created"
            exit 1
          fi
          ISO_SIZE=$(stat --format=%s seal-os.iso)
          echo "ISO size: $(du -h seal-os.iso | cut -f1) ($ISO_SIZE bytes)"
          MAX_ISO=$((64 * 1024 * 1024))
          if [ "$ISO_SIZE" -gt "$MAX_ISO" ]; then
            echo "FAIL: ISO exceeds 64MB"
            exit 1
          fi
          echo "OK: ISO within 64MB limit"
          # Verify ISO has correct structure
          file seal-os.iso | grep -i "iso\|boot" || echo "WARNING: file type check inconclusive"
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: seal-os-iso-ci
          path: kernel/seal-os/seal-os.iso

  kernel-qemu-smoke:
    name: QEMU boot smoke test
    runs-on: ubuntu-latest
    needs: kernel-iso
    steps:
      - uses: actions/checkout@v4
      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: seal-os-iso-ci
          path: .
      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86
      - name: Boot ISO in QEMU and capture serial output
        run: |
          timeout 30 qemu-system-x86_64 \
            -cdrom seal-os.iso \
            -serial stdio \
            -m 512M \
            -display none \
            -no-reboot \
            -no-shutdown 2>&1 | tee /tmp/seal-os.log || true
          echo "=== Serial output ==="
          cat /tmp/seal-os.log
      - name: Verify boot milestones
        run: |
          LOG=/tmp/seal-os.log
          PASS=0
          FAIL=0
          check() {
            if grep -q "$1" "$LOG"; then
              echo "PASS: $2"
              PASS=$((PASS + 1))
            else
              echo "FAIL: $2 (pattern: '$1')"
              FAIL=$((FAIL + 1))
            fi
          }
          check "Seal OS v1.0.0-alpha" "Banner printed"
          check "Heap initialized" "Heap initialized"
          check "IDT + PIC initialized" "Interrupts configured"
          check "Governor online" "T4 governor started"
          check "Voronoi index: 8 cells" "T1 Voronoi active"
          check "T1-T5 theorems ACTIVE" "All theorems active"
          check "ManifoldFS" "ManifoldFS initialized"
          check "Teleported.*O(1)" "O(1) teleportation"
          check "Scheduler" "Scheduler started"
          check "Syscall" "Syscalls verified"
          check "Shell" "Shell executed"
          echo ""
          echo "Results: $PASS passed, $FAIL failed"
          if [ "$FAIL" -gt 0 ]; then
            echo "FAIL: $FAIL boot milestones not reached"
            exit 1
          fi
      - name: Upload boot log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: seal-os-boot-log
          path: /tmp/seal-os.log

  kernel-clippy:
    name: Seal OS clippy (nightly)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: kernel/seal-os
      - name: cargo clippy (kernel)
        working-directory: kernel/seal-os
        run: cargo +nightly clippy -- -D warnings

  lean:
    name: Lean 4 (aether-verified)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Lean toolchain & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            kernel/aether/aether-verified/lean/.lake
            ~/.elan
          key: lean-${{ runner.os }}-v4.7.0-${{ hashFiles('kernel/aether/aether-verified/lean/lakefile.lean', 'kernel/aether/aether-verified/lean/lean-toolchain') }}
          restore-keys: |
            lean-${{ runner.os }}-v4.7.0-

      - name: Build aether-verified Lean package
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: kernel/aether/aether-verified/lean
          use-mathlib-cache: true
