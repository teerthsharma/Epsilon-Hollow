name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: cargo fmt --workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  build:
    name: cargo build --workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace

  clippy:
    name: cargo clippy --workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test --workspace
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      - name: Check aether-core no_std feature
        run: cargo +stable check --manifest-path kernel/epsilon/epsilon/crates/aether-core/Cargo.toml --no-default-features --features no_std
      - name: Check aether-core legacy migration gate
        run: cargo +stable test --manifest-path kernel/epsilon/epsilon/crates/aether-core/Cargo.toml --test legacy_migration_gate
      - name: Check README/doc claim contract
        run: cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-doc-claim-contract .
      - name: Check release workflow contract
        run: cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-release-workflow-contract .
      - name: Check Lean proof hygiene
        run: cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-lean-proof-hygiene .

  bench-compile:
    name: cargo bench --no-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo bench --workspace --no-run

  miri:
    name: miri (UB detection)
    runs-on: ubuntu-latest
    continue-on-error: false
    env:
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: cargo miri setup
        run: cargo +nightly miri setup
      - name: cargo miri test (aether-core state + os)
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation"
        run: |
          cargo +nightly miri test -p aether-core --features force-soft-floats --lib state::tests
          cargo +nightly miri test -p aether-core --features force-soft-floats --lib os::tests
          cargo +nightly miri test -p aether-core --features force-soft-floats --test proptest_os

  bench-regression:
    name: bench regression gate (io_cycle_8_lbas)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run criterion bench
        shell: bash
        run: |
          cargo bench --bench io_cycle --manifest-path kernel/aether/aether-link/Cargo.toml 2>&1 | tee bench.txt
      - name: Gate on io_cycle_8_lbas median ns/iter
        shell: bash
        run: |
          set -euo pipefail
          # Criterion 0.5 output: "io_cycle_8_lbas    time:   [44.123 ns 45.234 ns 46.345 ns]"
          line=$(grep -E 'io_cycle_8_lbas' bench.txt | grep 'time:' | head -n1)
          if [ -z "$line" ]; then
            echo "Could not find io_cycle_8_lbas timing line in bench.txt"
            cat bench.txt
            exit 1
          fi
          # Extract the median (middle value) from "[low median high]"
          ns=$(echo "$line" | sed -E 's/.*\[.*[[:space:]]([0-9]+(\.[0-9]+)?)[[:space:]]ns.*/\1/' | head -n1)
          ns_int=${ns%.*}
          echo "io_cycle_8_lbas median = $ns ns/iter"
          threshold=120
          if [ "$ns_int" -gt "$threshold" ]; then
            echo "REGRESSION: io_cycle_8_lbas = $ns ns/iter > threshold $threshold ns/iter"
            exit 1
          fi
          echo "OK: io_cycle_8_lbas = $ns ns/iter <= $threshold ns/iter"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: io-cycle-bench
          path: bench.txt

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit (locked to avoid MSRV-incompatible deps)
        run: cargo install cargo-audit --locked
      - run: cargo audit

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  docs:
    name: cargo doc -D warnings
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps

  bom:
    name: no UTF-8 BOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run BOM check
        shell: bash
        run: |
          chmod +x scripts/check_no_bom.sh
          ./scripts/check_no_bom.sh

  kernel-build:
    name: Build Seal OS kernel (UEFI, nightly)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: kernel/seal-os
      - name: Build kernel test-mode (UEFI)
        working-directory: kernel/seal-os
        run: cargo +nightly build --release --features test-mode
      - name: Save test-mode EFI
        run: |
          mkdir -p /tmp/kernel-test-mode-artifact
          cp kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os.efi /tmp/kernel-test-mode-artifact/seal-os.efi
      - name: Build kernel (release)
        working-directory: kernel/seal-os
        run: cargo +nightly build --release
      - name: Verify EFI binary exists
        working-directory: kernel/seal-os
        run: |
          BINARY=target/x86_64-unknown-uefi/release/seal-os.efi
          if [ ! -f "$BINARY" ]; then
            echo "FAIL: EFI binary not found at $BINARY"
            exit 1
          fi
          SIZE=$(stat --format=%s "$BINARY")
          echo "EFI binary size: $SIZE bytes ($(du -h $BINARY | cut -f1))"
          # Verify PE/COFF magic (MZ header)
          MAGIC=$(xxd -l 2 -p "$BINARY")
          if [ "$MAGIC" = "4d5a" ]; then
            echo "OK: PE/COFF (MZ) header verified"
          else
            echo "FAIL: Expected MZ header, got $MAGIC"
            exit 1
          fi
      - name: Upload kernel release artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-release
          path: kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os.efi
          retention-days: 1
      - name: Upload kernel test-mode artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-test-mode
          path: /tmp/kernel-test-mode-artifact/seal-os.efi
          retention-days: 1
      # Debug build is disabled on x86_64-unknown-uefi due to LLVM SIMD
      # lowering issues with crypto crates (aes, curve25519-dalek) on this target.
      # Release build is what we ship and is fully verified above.
      # - name: Build kernel (debug)
      #   working-directory: kernel/seal-os
      #   run: cargo +nightly build

  kernel-image:
    name: Build Seal OS UEFI disk image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: kernel-build
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            kernel/seal-os
            kernel/seal-mkimage
      - name: Download kernel release artifact
        uses: actions/download-artifact@v4
        with:
          name: kernel-release
          path: kernel/seal-os/target/x86_64-unknown-uefi/release/
      - name: Build mkimage tool
        working-directory: kernel/seal-mkimage
        run: cargo +stable build --release
      - name: Create UEFI disk image
        working-directory: kernel/seal-mkimage
        run: cargo +stable run --release
      - name: Verify disk image
        working-directory: kernel/seal-mkimage
        run: |
          IMG=../seal-os/target/x86_64-unknown-uefi/release/seal-os.img
          EFI=../seal-os/target/x86_64-unknown-uefi/release/seal-os.efi
          if [ ! -f "$IMG" ]; then
            echo "FAIL: Disk image not created"
            exit 1
          fi
          IMG_SIZE=$(stat --format=%s "$IMG")
          echo "Disk image size: $(du -h $IMG | cut -f1) ($IMG_SIZE bytes)"
          cargo +stable run --release -- --verify "$IMG" "$EFI"
      - name: Build UEFI ISO
        run: |
          sudo apt-get update && sudo apt-get install -y xorriso
          chmod +x scripts/build_iso.sh
          scripts/build_iso.sh
          if [ -f seal-os.iso ]; then
            echo "OK: ISO created ($(du -h seal-os.iso | cut -f1))"
          else
            echo "FAIL: ISO not created"
            exit 1
          fi
      - name: Upload disk image artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seal-os-img-ci
          path: |
            kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os.img
            seal-os.iso

  kernel-qemu-smoke:
    name: QEMU UEFI boot smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: kernel-image
    steps:
      - uses: actions/checkout@v4
      - name: Download disk image artifact
        uses: actions/download-artifact@v4
        with:
          name: seal-os-img-ci
          path: .
      - name: Install QEMU and OVMF
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86 ovmf
      - name: Extract expected Seal OS version
        id: version
        run: |
          EXPECTED=$(grep '^version' kernel/seal-os/Cargo.toml | head -n1 | sed 's/.*"\(.*\)".*/\1/')
          echo "expected=$EXPECTED" >> "$GITHUB_OUTPUT"
          echo "Expected Seal OS version: $EXPECTED"
      - name: Boot UEFI image in QEMU and capture serial output
        run: |
          set -euo pipefail
          IMG_PATH="kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os.img"
          if [ ! -f "$IMG_PATH" ]; then
            echo "Looking for disk image..."
            find . -name "seal-os.img" -type f
            IMG_PATH=$(find . -name "seal-os.img" -type f | head -n1)
          fi
          echo "Using disk image: $IMG_PATH"
          set +e
          timeout 240 qemu-system-x86_64 \
            -machine q35 \
            -drive if=pflash,format=raw,readonly=on,file=/usr/share/OVMF/OVMF_CODE_4M.fd \
            -device ahci,id=seal_sata \
            -drive if=none,id=seal_disk,file="$IMG_PATH",format=raw,media=disk \
            -device ide-hd,drive=seal_disk,bus=seal_sata.0,unit=0 \
            -nographic \
            -m 4G \
            -no-reboot \
            -no-shutdown 2>&1 | tee /tmp/seal-os.log
          QEMU_STATUS=${PIPESTATUS[0]}
          set -e
          if [ "$QEMU_STATUS" -ne 0 ] && [ "$QEMU_STATUS" -ne 124 ]; then
            echo "FAIL: QEMU exited with status $QEMU_STATUS"
            exit "$QEMU_STATUS"
          fi
          if [ "$QEMU_STATUS" -eq 124 ]; then
            echo "OK: QEMU kept running until smoke timeout"
          fi
          echo "=== Serial output ==="
          cat /tmp/seal-os.log
          echo "=== Log size: $(wc -c < /tmp/seal-os.log) bytes ==="
      - name: Verify hard boot milestones
        run: |
          LOG=/tmp/seal-os.log
          PASS=0
          FAIL=0
          check() {
            if grep -q "$1" "$LOG"; then
              echo "PASS: $2"
              PASS=$((PASS + 1))
            else
              echo "FAIL: $2 (pattern: '$1')"
              FAIL=$((FAIL + 1))
            fi
          }
          # Hard milestones — the kernel must reach these during normal boot.
          check "UEFI boot complete" "UEFI boot"
          check "Seal OS v${{ steps.version.outputs.expected }}" "Exact v${{ steps.version.outputs.expected }} banner printed"
          check "Heap initialized" "Heap initialized"
          check "IDT + PIC initialized" "Interrupts configured"
          check "Governor online" "T4 governor started"
          check "Voronoi index: 8 cells" "T1 Voronoi active"
          check "All T1-T10 theorems VERIFIED" "All theorem gates verified"
          check "\\[BENCH\\] toporam-alloc" "TopoRAM target-cell benchmark emitted"
          check "\\[BENCH\\] alloc-frame" "Physical allocator benchmark emitted"
          check "\\[BENCH\\] manifold-teleport" "ManifoldFS teleport benchmark emitted"
          check "\\[BENCH\\] scheduler-select-next" "Scheduler selector benchmark emitted"
          check "\\[BENCH\\] tcp-packet-demux" "TCP packet demux benchmark emitted"
          check "\\[Aether-Lang\\] runtime proof" "Aether-Lang runtime proof emitted"
          check "\\[LAAMBA\\] app proof:" "LAAMBA kernel app proof emitted"
          check "\\[GFX\\] desktop-proof" "Serial desktop pixel proof emitted"
          check "\\[GFX\\] desktop-live-proof" "Desktop live input proof emitted"
          check "\\[GFX\\] desktop-soak" "Desktop compositor soak emitted"
          check "Device model: QEMU HARDDISK" "AHCI disk identified"
          check "Registered as block device 0x800" "AHCI block device registered"
          check "ManifoldFS mounted from disk" "Persistent ManifoldFS root mounted"
          check "Desktop proof frame blit done" "Desktop frame blitted"
          check "Seal OS desktop ready." "Desktop ready"
          check "Entering real event loop" "Event loop active"
          check "Scheduler" "Scheduler started"
          check "SYSCALL/SYSRET" "Syscalls verified"
          echo ""
          echo "Hard milestones: $PASS passed, $FAIL failed"
          if [ "$FAIL" -gt 0 ]; then
            echo "FAIL: $FAIL hard boot milestones not reached"
            exit 1
          fi
      - name: Verify theorem gate lines
        run: cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-theorem-log /tmp/seal-os.log
      - name: Verify full VM proof gate
        run: cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-vm-proof /tmp/seal-os.log
      - name: Verify Aether-Lang runtime proof
        run: cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-aether-runtime /tmp/seal-os.log
      - name: Verify LAAMBA kernel app proof
        run: cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-laamba-app-proof /tmp/seal-os.log
      - name: Verify desktop compositor soak marker
        run: cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-desktop-soak /tmp/seal-os.log
      - name: Verify benchmark proof markers
        run: cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-benchmark-log /tmp/seal-os.log
      - name: Verify T1-T5 runtime theorem coverage
        run: cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-runtime-theorems .
      - name: Verify Seal ABI/no-POSIX discipline
        run: cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-seal-abi .
      - name: Verify Seal OS language hygiene
        run: cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-language-hygiene .
      - name: Verify Aether/Rust migration gates
        run: cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-aether-migration .
      - name: Verify O(1) allocator hot path
        run: cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-o1-allocator .
      - name: Verify O(1) TCP demux indexes
        run: cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-o1-network .
      - name: Inventory unsafe Rust blocks
        run: cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --unsafe-inventory .
      - name: Verify soft boot milestones
        run: |
          LOG=/tmp/seal-os.log
          PASS=0
          FAIL=0
          check() {
            if grep -q "$1" "$LOG"; then
              echo "PASS: $2"
              PASS=$((PASS + 1))
            else
              echo "SKIP: $2 (pattern: '$1') — soft milestone, not required"
              FAIL=$((FAIL + 1))
            fi
          }
          # Soft milestones — nice to have but not required for green CI.
          check "Teleported.*O(1)" "O(1) teleportation"
          check "ManifoldFS" "ManifoldFS initialized"
          check "SealShell" "SealShell loaded"
          check "ManifoldPkg" "ManifoldPkg initialized"
          check "Aether-Lang" "Aether-Lang runtime ready"
          check "WiFi" "WiFi driver loaded"
          check "Bluetooth" "Bluetooth driver loaded"
          check "USB" "USB subsystem loaded"
          check "aether-link" "Aether-Link prefetch active"
          check "AsyncRT" "Async runtime ready"
          check "Snake" "Games available"
          check "Desktop" "Desktop rendered"
          check "Framebuffer" "Framebuffer initialized"
          check "VBE" "VBE fallback used"
          echo ""
          echo "Soft milestones: $PASS passed, $FAIL skipped"
      - name: Upload boot log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: seal-os-boot-log
          path: /tmp/seal-os.log

  ubuntu-alloc-baseline:
    name: Native Ubuntu 26.04 allocator comparison
    runs-on: [self-hosted, Linux, X64, ubuntu-26.04]
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch'
    needs: kernel-image
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify native Ubuntu 26.04 runner
        shell: bash
        run: |
          set -euo pipefail
          . /etc/os-release
          if [ "${ID:-}" != "ubuntu" ] || [ "${VERSION_ID:-}" != "26.04" ]; then
            echo "FAIL: expected native Ubuntu 26.04, got ID=${ID:-unknown} VERSION_ID=${VERSION_ID:-unknown}"
            exit 1
          fi
          kernel="$(uname -r | tr '[:upper:]' '[:lower:]')"
          if echo "$kernel" | grep -E 'microsoft|wsl'; then
            echo "FAIL: WSL kernels are not accepted for Ubuntu benchmark evidence: $kernel"
            exit 1
          fi
          {
            echo "github_sha=${GITHUB_SHA}"
            echo "github_run_id=${GITHUB_RUN_ID}"
            echo "runner_name=${RUNNER_NAME:-unknown}"
            echo "runner_os=${RUNNER_OS:-unknown}"
            cat /etc/os-release
            uname -a
            lscpu
            free -h
            lsblk
          } | tee /tmp/ubuntu-baseline-manifest.txt
      - name: Download disk image artifact
        uses: actions/download-artifact@v4
        with:
          name: seal-os-img-ci
          path: .
      - name: Install QEMU and OVMF
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86 ovmf
      - name: Boot Seal OS on the same Ubuntu runner
        shell: bash
        run: |
          set -euo pipefail
          IMG_PATH="kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os.img"
          if [ ! -f "$IMG_PATH" ]; then
            IMG_PATH=$(find . -name "seal-os.img" -type f | head -n1)
          fi
          echo "Using disk image: $IMG_PATH"
          set +e
          timeout 240 qemu-system-x86_64 \
            -machine q35 \
            -drive if=pflash,format=raw,readonly=on,file=/usr/share/OVMF/OVMF_CODE_4M.fd \
            -device ahci,id=seal_sata \
            -drive if=none,id=seal_disk,file="$IMG_PATH",format=raw,media=disk \
            -device ide-hd,drive=seal_disk,bus=seal_sata.0,unit=0 \
            -nographic \
            -m 4G \
            -no-reboot \
            -no-shutdown 2>&1 | tee /tmp/seal-os-ubuntu-baseline.log
          QEMU_STATUS=${PIPESTATUS[0]}
          set -e
          if [ "$QEMU_STATUS" -ne 0 ] && [ "$QEMU_STATUS" -ne 124 ]; then
            echo "FAIL: QEMU exited with status $QEMU_STATUS"
            exit "$QEMU_STATUS"
          fi
      - name: Capture Ubuntu allocator artifact
        shell: bash
        run: |
          cargo +stable run --manifest-path tools/ubuntu-alloc-bench/Cargo.toml --release -- 64 | tee /tmp/ubuntu-alloc.log
      - name: Verify and compare allocator artifacts
        shell: bash
        run: |
          cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-benchmark-log /tmp/seal-os-ubuntu-baseline.log
          cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-ubuntu-benchmark-log /tmp/ubuntu-alloc.log
          cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --compare-benchmark-logs /tmp/seal-os-ubuntu-baseline.log /tmp/ubuntu-alloc.log
      - name: Upload Ubuntu comparison artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ubuntu-26-alloc-comparison
          path: |
            /tmp/seal-os-ubuntu-baseline.log
            /tmp/ubuntu-alloc.log
            /tmp/ubuntu-baseline-manifest.txt

  kernel-clippy:
    name: Seal OS clippy (nightly)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: kernel/seal-os
      - name: cargo clippy (kernel)
        working-directory: kernel/seal-os
        run: cargo +nightly clippy -- -A unused -A dead_code -A clippy::approx_constant

  laamba-governor-check:
    name: LAAMBA Governor check (Rust backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libappindicator3-dev librsvg2-dev libglib2.0-dev libgdk-pixbuf2.0-dev libatk1.0-dev libcairo2-dev libpango1.0-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/laamba-governor/src-tauri
      - name: Create stub frontend dist for tauri context
        working-directory: apps/laamba-governor
        run: mkdir -p dist && echo '<html><body>stub</body></html>' > dist/index.html
      - name: cargo check (laamba-governor backend)
        working-directory: apps/laamba-governor/src-tauri
        env:
          RUSTFLAGS: ""
        run: cargo check

  lean:
    name: Lean 4 (aether-verified)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Lean toolchain & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            kernel/aether/aether-verified/lean/.lake
            ~/.elan
