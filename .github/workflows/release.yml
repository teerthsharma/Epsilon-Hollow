name: Release ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0-alpha)'
        required: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-iso:
    name: Build Seal OS ISO
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: kernel/seal-os

      - name: Install GRUB and ISO tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            grub-pc-bin grub-common xorriso mtools

      - name: Build kernel
        working-directory: kernel/seal-os
        run: cargo +nightly build --release

      - name: Create bootable ISO
        working-directory: kernel/seal-os
        run: |
          mkdir -p iso/boot/grub
          cp target/x86_64-unknown-none/release/seal-os iso/boot/kernel.bin
          cp boot/grub/grub.cfg iso/boot/grub/grub.cfg
          grub-mkrescue -o seal-os.iso iso/

      - name: Report sizes
        working-directory: kernel/seal-os
        run: |
          echo "Kernel: $(du -h target/x86_64-unknown-none/release/seal-os | cut -f1)"
          echo "ISO:    $(du -h seal-os.iso | cut -f1)"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: seal-os-iso
          path: kernel/seal-os/seal-os.iso

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: kernel/seal-os/seal-os.iso
          body: |
            ## Seal OS ${{ github.ref_name }}

            **The Geometrical Operating System** — all data is geometry on S², file moves are O(1) topological surgery.

            ### What's in the ISO
            - Bare-metal x86_64 kernel with GRUB2 bootloader
            - **SealShell**: 30+ English-first commands (type `help` for handbook)
            - **ManifoldFS**: files as 64-point clouds on S², O(1) teleport
            - **ManifoldPkg**: native package manager with Voronoi dependency resolution
            - **Aether-Lang**: Titan bytecode VM scripting language
            - **Drivers**: PCI, WiFi (802.11), Bluetooth (BLE), GPU, USB (xHCI/HID/mass storage)
            - **Network stack**: TCP/UDP/DHCP/DNS/HTTP/TLS
            - **Aether-Link**: predictive I/O prefetch (~18ns/decision)
            - **Async runtime**: single-threaded waker-based executor
            - **Calculator**: scientific calculator with expression parsing
            - **SealPlayer**: media player (MP4, MKV, AVI, MOV, WebM, MP3, FLAC, WAV, AAC)
            - **Games**: Snake, Breakout, Warp Racer
            - **Desktop**: compositing WM with themes (dark/light/seal/matrix)
            - All T1-T5 topology theorems active in kernel

            ### Run it
            ```bash
            # QEMU (recommended: 4GB RAM for full experience)
            qemu-system-x86_64 -cdrom seal-os.iso -serial stdio -m 4G -vga std

            # Real hardware
            dd if=seal-os.iso of=/dev/sdX bs=4M status=progress
            ```

            ### Docker (with display)
            ```bash
            cd kernel/seal-os && docker compose up --build
            ```
          generate_release_notes: true

      - name: Create release from dispatch
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || 'latest' }}
          files: kernel/seal-os/seal-os.iso
          body: |
            ## Seal OS (dev build)

            Built from `main` branch at ${{ github.sha }}.

            ```bash
            qemu-system-x86_64 -cdrom seal-os.iso -serial stdio -m 512M -vga std
            ```
          prerelease: true
