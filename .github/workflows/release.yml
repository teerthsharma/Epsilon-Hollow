name: Release UEFI Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0-alpha)'
        required: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-image:
    name: Build Seal OS UEFI Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            kernel/seal-os
            kernel/seal-mkimage

      - name: Build kernel
        working-directory: kernel/seal-os
        run: cargo +nightly build --release

      - name: Build mkimage and create UEFI disk image
        working-directory: kernel/seal-mkimage
        run: cargo +stable run --release

      - name: Report sizes
        working-directory: kernel/seal-os
        run: |
          echo "Kernel: $(du -h target/x86_64-unknown-uefi/release/seal-os.efi | cut -f1)"
          echo "Image:  $(du -h target/x86_64-unknown-uefi/release/seal-os.img | cut -f1)"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: seal-os-img
          path: kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os.img

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os.img
          body: |
            ## Seal OS ${{ github.ref_name }}

            **The Geometrical Operating System** — all data is geometry on S², file moves are O(1) topological surgery.

            ### What's in the image
            - Bare-metal x86_64 UEFI kernel (pure Rust, zero assembly, zero GNU dependencies)
            - **SealShell**: 30+ English-first commands (type `help` for handbook)
            - **ManifoldFS**: files as 64-point clouds on S², O(1) teleport
            - **ManifoldPkg**: native package manager with Voronoi dependency resolution
            - **Aether-Lang**: Titan bytecode VM scripting language
            - **Drivers**: PCI, WiFi (802.11), Bluetooth (BLE), GPU, USB (xHCI/HID/mass storage)
            - **Network stack**: TCP/UDP/DHCP/DNS/HTTP/TLS
            - **Aether-Link**: predictive I/O prefetch (~18ns/decision)
            - **Async runtime**: single-threaded waker-based executor
            - **Calculator**: scientific calculator with expression parsing
            - **SealPlayer**: media player (MP4, MKV, AVI, MOV, WebM, MP3, FLAC, WAV, AAC)
            - **Games**: Snake, Breakout, Warp Racer
            - **Desktop**: compositing WM with themes (dark/light/seal/matrix)
            - All T1-T5 topology theorems active in kernel

            ### Run it
            ```bash
            # QEMU with UEFI firmware
            qemu-system-x86_64 -machine q35 -drive if=pflash,format=raw,readonly=on,file=/usr/share/OVMF/OVMF_CODE_4M.fd -drive file=seal-os.img,format=raw -serial stdio -m 4G -vga std

            # Real UEFI hardware
            dd if=seal-os.img of=/dev/sdX bs=4M status=progress
            ```
          generate_release_notes: true

      - name: Create release from dispatch
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || 'latest' }}
          files: kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os.img
          body: |
            ## Seal OS (dev build)

            Built from `main` branch at ${{ github.sha }}.

            ```bash
            qemu-system-x86_64 -machine q35 -drive if=pflash,format=raw,readonly=on,file=/usr/share/OVMF/OVMF_CODE_4M.fd -drive file=seal-os.img,format=raw -serial stdio -m 512M -vga std
            ```
          prerelease: true
