name: Release UEFI Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish, e.g. v0.4.7.5"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-kernel:
    name: Build Seal OS kernel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Validate dispatch tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event.inputs.tag }}" in
            v*) ;;
            *)
              echo "Release tag must start with v"
              exit 1
              ;;
          esac
          git rev-parse --verify "${{ github.event.inputs.tag }}"

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: kernel/seal-os

      - name: Build kernel
        working-directory: kernel/seal-os
        run: cargo +nightly build --release

      - name: Upload kernel release artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-release
          path: kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os.efi
          retention-days: 1

  release:
    name: Build, prove, and release Seal OS image
    runs-on: ubuntu-latest
    needs: build-kernel
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install QEMU and OVMF
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends xorriso qemu-system-x86 ovmf socat

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            kernel/seal-os
            kernel/seal-mkimage

      - name: Download kernel release artifact
        uses: actions/download-artifact@v4
        with:
          name: kernel-release
          path: kernel/seal-os/target/x86_64-unknown-uefi/release/

      - name: Build mkimage and create UEFI disk image
        working-directory: kernel/seal-mkimage
        run: cargo +stable run --release

      - name: Build UEFI ISO
        run: |
          chmod +x scripts/build_iso.sh
          scripts/build_iso.sh

      - name: Boot release ISO in QEMU and capture serial output
        shell: bash
        run: |
          set -euo pipefail
          set +e
          timeout 240 qemu-system-x86_64 \
            -machine q35 \
            -drive if=pflash,format=raw,readonly=on,file=/usr/share/OVMF/OVMF_CODE_4M.fd \
            -cdrom seal-os.iso \
            -boot d \
            -nographic \
            -m 4G \
            -no-reboot \
            -no-shutdown 2>&1 | tee /tmp/seal-os-release-iso.log
          QEMU_STATUS=${PIPESTATUS[0]}
          set -e
          if [ "$QEMU_STATUS" -ne 0 ] && [ "$QEMU_STATUS" -ne 124 ]; then
            echo "FAIL: ISO QEMU exited with status $QEMU_STATUS"
            exit "$QEMU_STATUS"
          fi

      - name: Verify release ISO boot proof
        shell: bash
        run: |
          set -euo pipefail
          LOG=/tmp/seal-os-release-iso.log
          EXPECTED_TAG="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}"
          check() {
            if ! grep -q "$1" "$LOG"; then
              echo "FAIL: missing ISO boot marker: $2 ($1)"
              exit 1
            fi
            echo "PASS: $2"
          }
          check "UEFI boot complete" "UEFI boot"
          check "Seal OS ${EXPECTED_TAG}" "release banner"
          check "No persistent disk found. Falling back to ramfs." "live ISO ramfs fallback"
          check "All T1-T10 theorems VERIFIED" "theorem gates"
          check "\\[BENCH\\] topo-render-3d .*result=pass" "topological render benchmark"
          check "\\[BENCH\\] tensor-render .*result=pass" "tensor render benchmark"
          check "\\[GFX\\] desktop-live-proof .*result=pass" "desktop live input proof"
          check "\\[BOOT\\] Seal OS desktop ready." "desktop ready"
          check "Entering real event loop" "event loop"
          cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-theorem-log "$LOG"
          cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-aether-runtime "$LOG"
          cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-laamba-app-proof "$LOG"
          cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-desktop-soak "$LOG"
          cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-benchmark-log "$LOG"

      - name: Check release workflow contract
        run: cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-release-workflow-contract .

      - name: Verify release disk image
        working-directory: kernel/seal-mkimage
        run: |
          cargo +stable run --release -- --verify \
            ../seal-os/target/x86_64-unknown-uefi/release/seal-os.img \
            ../seal-os/target/x86_64-unknown-uefi/release/seal-os.efi

      - name: Boot release image in QEMU and capture serial output
        shell: bash
        run: |
          set -euo pipefail
          set +e
          timeout 240 qemu-system-x86_64 \
            -machine q35 \
            -drive if=pflash,format=raw,readonly=on,file=/usr/share/OVMF/OVMF_CODE_4M.fd \
            -device ahci,id=seal_sata \
            -drive if=none,id=seal_disk,file=kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os.img,format=raw,media=disk \
            -device ide-hd,drive=seal_disk,bus=seal_sata.0,unit=0 \
            -nographic \
            -m 4G \
            -no-reboot \
            -no-shutdown 2>&1 | tee /tmp/seal-os-release.log
          QEMU_STATUS=${PIPESTATUS[0]}
          set -e
          if [ "$QEMU_STATUS" -ne 0 ] && [ "$QEMU_STATUS" -ne 124 ]; then
            echo "FAIL: QEMU exited with status $QEMU_STATUS"
            exit "$QEMU_STATUS"
          fi

      - name: Verify release VM proof
        run: cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-vm-proof /tmp/seal-os-release.log

      - name: Verify release theorem proof
        run: cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-theorem-log /tmp/seal-os-release.log

      - name: Verify release Aether proof
        run: cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-aether-runtime /tmp/seal-os-release.log

      - name: Verify release LAAMBA app proof
        run: cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-laamba-app-proof /tmp/seal-os-release.log

      - name: Verify release desktop soak
        run: cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-desktop-soak /tmp/seal-os-release.log

      - name: Capture release proof screen in QEMU
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/capture_qemu_proof_screen.sh
          scripts/capture_qemu_proof_screen.sh \
            kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os.img \
            /tmp/seal-os-screen.log \
            /tmp/seal-os-screen.ppm

      - name: Verify release proof screen
        run: cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-proof-screen /tmp/seal-os-screen.ppm

      - name: Verify release benchmark proof
        run: cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-benchmark-log /tmp/seal-os-release.log

      - name: Verify release source proof gates
        run: |
          cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-doc-claim-contract .
          cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-runtime-theorems .
          cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-seal-abi .
          cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-language-hygiene .
          cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-aether-migration .
          cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-o1-allocator .
          cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-o1-network .

      - name: Stage release proof artifacts
        run: |
          mkdir -p release-proof
          cp /tmp/seal-os-release.log release-proof/serial.log
          cp /tmp/seal-os-release-iso.log release-proof/iso-serial.log
          cp /tmp/seal-os-screen.log release-proof/screen-serial.log
          cp /tmp/seal-os-screen.ppm release-proof/screen.ppm
          cp kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os.efi release-proof/seal-os.efi
          cp kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os-efi.img release-proof/seal-os-efi.img
          cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --write-qemu-proof-manifest release-proof kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os.img ci 240 .
          cargo +stable run --manifest-path kernel/seal-mkimage/Cargo.toml --release -- --check-current-proof-manifest release-proof/proof-manifest.txt .
          {
            echo "QEMU serial and captured desktop pixel proof passed for this release image."
            echo "QEMU ISO boot proof passed for seal-os.iso with live ramfs fallback, desktop, runtime, and benchmark gates."
            echo "Not an any-VM, hardware-GPU, or Ubuntu-superiority proof."
            echo "Proof gates: VM, theorem, Aether runtime, LAAMBA app proof, desktop soak, captured proof-screen pixels, proof manifest provenance, benchmark, doc claims, runtime theorems, Seal ABI, language hygiene, Aether migration, O(1) allocator, and O(1) TCP demux indexes."
          } > release-proof/proof-summary.txt
          sha256sum \
            kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os.img \
            kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os.efi \
            kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os-efi.img \
            seal-os.iso \
            release-proof/serial.log \
            release-proof/iso-serial.log \
            release-proof/screen.ppm \
            release-proof/proof-manifest.txt \
            release-proof/proof-summary.txt \
            > release-proof/SHA256SUMS.txt

      - name: Upload release proof artifacts
        uses: actions/upload-artifact@v4
        with:
          name: seal-os-release-proof
          path: release-proof/

      - name: Report sizes
        working-directory: kernel/seal-os
        run: |
          echo "Kernel: $(du -h target/x86_64-unknown-uefi/release/seal-os.efi | cut -f1)"
          echo "Image:  $(du -h target/x86_64-unknown-uefi/release/seal-os.img | cut -f1)"

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: seal-os-images
          path: |
            kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os.img
            kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os.efi
            kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os-efi.img
            seal-os.iso
            release-proof/serial.log
            release-proof/iso-serial.log
            release-proof/screen-serial.log
            release-proof/screen.ppm
            release-proof/proof-manifest.txt
            release-proof/proof-summary.txt
            release-proof/SHA256SUMS.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os.img
            kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os.efi
            kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os-efi.img
            seal-os.iso
            release-proof/serial.log
            release-proof/iso-serial.log
            release-proof/screen-serial.log
            release-proof/screen.ppm
            release-proof/proof-manifest.txt
            release-proof/proof-summary.txt
            release-proof/SHA256SUMS.txt
          body: |
            ## Seal OS ${{ github.ref_name }}

            QEMU serial and captured desktop pixel proof passed for this release image.
            Not an any-VM, hardware-GPU, or Ubuntu-superiority proof.

            ### Release proof
            - VM proof, theorem proof, Aether runtime proof, LAAMBA app proof, desktop live input proof, desktop soak, and benchmark proof ran against `release-proof/serial.log`.
            - ISO boot proof ran against `release-proof/iso-serial.log`, proving `seal-os.iso` reaches desktop/event loop with live ramfs fallback plus theorem, Aether, LAAMBA, desktop, and benchmark gates.
            - Captured QEMU framebuffer pixels in `release-proof/screen.ppm` passed `seal-mkimage --check-proof-screen`.
            - `release-proof/proof-manifest.txt` passed `seal-mkimage --check-current-proof-manifest`, binding image, EFI, serial log, screen PPM, commit, and clean/dirty state.
            - Source gates ran for doc claims, runtime theorems, Seal ABI/no-POSIX discipline, language hygiene, Aether migration, O(1) allocator hot path, and O(1) TCP demux indexes.

            ### What is in the image
            - Bare-metal x86_64 UEFI research kernel.
            - SealShell native command surface.
            - ManifoldFS same-filesystem metadata teleport proof marker; broad filesystem parity still requires fixtures.
            - Aether-Lang Titan VM scripting path.
            - TCP demux proof marker with bounded exact-flow and listener indexes; production internet TLS remains limited to the documented PSK path.
            - Software-rendered desktop with live icon-click/focus proof and compositor soak proof markers.

            ### Honest limits
            - VirtualBox, real hardware, hardware GPU/VRAM, and Ubuntu-superiority claims need their own proof artifacts.
            - WiFi and Bluetooth paths remain simulated unless hardware firmware support lands.
            - Filesystem parity, production TLS, and long-haul reliability remain gated work.

            ### Run it
            ```bash
            qemu-system-x86_64 -machine q35 -drive if=pflash,format=raw,readonly=on,file=/usr/share/OVMF/OVMF_CODE_4M.fd -drive file=seal-os.img,format=raw -serial stdio -m 4G -vga std
            ```
          generate_release_notes: true
          make_latest: true

      - name: Create release from dispatch
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: |
            kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os.img
            kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os.efi
            kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os-efi.img
            seal-os.iso
            release-proof/serial.log
            release-proof/iso-serial.log
            release-proof/screen-serial.log
            release-proof/screen.ppm
            release-proof/proof-manifest.txt
            release-proof/proof-summary.txt
            release-proof/SHA256SUMS.txt
          body: |
            ## Seal OS ${{ github.event.inputs.tag }}

            QEMU serial and captured desktop pixel proof passed for this release image.
            Not an any-VM, hardware-GPU, or Ubuntu-superiority proof.

            Built from `${{ github.sha }}`.

            Attached proof artifacts:
            - `seal-os.iso`
            - `seal-os.img`
            - `seal-os.efi`
            - `seal-os-efi.img`
            - `serial.log`
            - `iso-serial.log`
            - `screen-serial.log`
            - `screen.ppm`
            - `proof-manifest.txt`
            - `proof-summary.txt`
            - `SHA256SUMS.txt`

            The serial proof includes theorem, Aether runtime, LAAMBA app,
            desktop live input, desktop soak, and benchmark gates. The captured
            QEMU framebuffer pixels in `screen.ppm` passed `seal-mkimage
            --check-proof-screen`. The proof manifest passed `seal-mkimage
            --check-current-proof-manifest`.
            The ISO boot proof in `iso-serial.log` proves `seal-os.iso` reaches
            desktop/event loop with live ramfs fallback plus theorem, Aether,
            LAAMBA, desktop, and benchmark gates.

            ### Run it
            ```bash
            qemu-system-x86_64 -machine q35 -drive if=pflash,format=raw,readonly=on,file=/usr/share/OVMF/OVMF_CODE_4M.fd -drive file=seal-os.img,format=raw -serial stdio -m 4G -vga std
            ```
          prerelease: false
          make_latest: true
