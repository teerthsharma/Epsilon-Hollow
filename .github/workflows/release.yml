name: Release UEFI Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0-alpha)'
        required: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-image:
    name: Build Seal OS UEFI Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview

      - uses: dtolnay/rust-toolchain@stable

      - name: Install ISO tools
        run: sudo apt-get update && sudo apt-get install -y xorriso

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            kernel/seal-os
            kernel/seal-mkimage

      - name: Build kernel
        working-directory: kernel/seal-os
        run: cargo +nightly build --release

      - name: Build mkimage and create UEFI disk image
        working-directory: kernel/seal-mkimage
        run: cargo +stable run --release

      - name: Build UEFI ISO
        run: |
          chmod +x scripts/build_iso.sh
          scripts/build_iso.sh

      - name: Report sizes
        working-directory: kernel/seal-os
        run: |
          echo "Kernel: $(du -h target/x86_64-unknown-uefi/release/seal-os.efi | cut -f1)"
          echo "Image:  $(du -h target/x86_64-unknown-uefi/release/seal-os.img | cut -f1)"

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: seal-os-images
          path: |
            kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os.img
            seal-os.iso

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os.img
            seal-os.iso
          body: |
            ## Seal OS ${{ github.ref_name }}

            **The Geometrical Operating System** — all data is geometry on S², file moves are O(1) topological surgery.

            ### What's in the image
            - Bare-metal x86_64 UEFI kernel (pure Rust, zero assembly, zero GNU dependencies)
            - **SealShell**: 30+ English-first commands (type `help` for handbook)
            - **ManifoldFS**: files as 64-point clouds on S², O(1) teleport
            - **ManifoldPkg**: native package manager with Voronoi dependency resolution
            - **Aether-Lang**: Titan bytecode VM scripting language
            - **Drivers**: PCI enumeration, USB xHCI (HID + Mass Storage), NVMe, AHCI SATA, Intel e1000, Intel HDA audio
            - **Network stack**: TCP/UDP/DHCP/DNS/HTTP/TLS 1.3 + HTTPS client
            - **Aether-Link**: predictive I/O prefetch (~18ns/decision)
            - **Async runtime**: single-threaded waker-based executor
            - **Calculator**: scientific calculator with expression parsing
            - **SealPlayer**: media player (WAV/PCM playback)
            - **Games**: Snake, Breakout, Warp Racer
            - **Desktop**: compositing WM with themes (dark/light/seal/matrix)
            - T1-T10 theorem gate verified at boot; T1-T5 active in kernel runtime paths

            ### Honest limits
            - **WiFi / Bluetooth**: Simulated state machines with deterministic scan/connect/pair. Real firmware blobs are vendor IP, out of scope.
            - **GPU**: Software rendering only. 3D acceleration requires vendor firmware.
            - **FAT + ext2**: Full read-write drivers included.

            ### Run it
            ```bash
            # QEMU with UEFI firmware
            qemu-system-x86_64 -machine q35 -drive if=pflash,format=raw,readonly=on,file=/usr/share/OVMF/OVMF_CODE_4M.fd -drive file=seal-os.img,format=raw -serial stdio -m 4G -vga std

            # Real UEFI hardware
            dd if=seal-os.img of=/dev/sdX bs=4M status=progress
            ```
          generate_release_notes: true

      - name: Create release from dispatch
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || 'latest' }}
          files: |
            kernel/seal-os/target/x86_64-unknown-uefi/release/seal-os.img
            seal-os.iso
          body: |
            ## Seal OS (dev build)

            Built from `main` branch at ${{ github.sha }}.

            ### Run it
            ```bash
            # QEMU with UEFI firmware
            qemu-system-x86_64 -machine q35 -drive if=pflash,format=raw,readonly=on,file=/usr/share/OVMF/OVMF_CODE_4M.fd -drive file=seal-os.img,format=raw -serial stdio -m 4G -vga std

            # VirtualBox
            VBoxManage convertfromraw --format VDI seal-os.img seal-os.vdi
            # Create VM: Other/Unknown (64-bit), EFI enabled, SATA/AHCI, attach seal-os.vdi
            # Or boot from seal-os.iso as UEFI optical media.
            ```
          prerelease: true
