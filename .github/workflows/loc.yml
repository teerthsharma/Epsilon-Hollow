name: Update Rust Line Count

on:
  push:
    branches: [main, readme-upgrade]

permissions:
  contents: write

jobs:
  count:
    name: Count Rust LoC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Count Rust lines
        id: loc
        shell: bash
        run: |
          RUST_LINES=$(find . -name '*.rs' -not -path './target/*' -not -path './.claude/*' | xargs cat | wc -l)
          RUST_FILES=$(find . -name '*.rs' -not -path './target/*' -not -path './.claude/*' | wc -l)
          ASM_LINES=$(find . -name '*.S' -o -name '*.s' | xargs cat 2>/dev/null | wc -l)
          LEAN_LINES=$(find . -name '*.lean' -not -path '*/.lake/*' | xargs cat 2>/dev/null | wc -l)
          PYTHON_LINES=$(find . -name '*.py' | xargs cat 2>/dev/null | wc -l)
          TOTAL=$((RUST_LINES + ASM_LINES + LEAN_LINES + PYTHON_LINES))

          echo "rust_lines=$RUST_LINES" >> "$GITHUB_OUTPUT"
          echo "rust_files=$RUST_FILES" >> "$GITHUB_OUTPUT"
          echo "asm_lines=$ASM_LINES" >> "$GITHUB_OUTPUT"
          echo "lean_lines=$LEAN_LINES" >> "$GITHUB_OUTPUT"
          echo "python_lines=$PYTHON_LINES" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

          RUST_FMT=$(printf "%'d" "$RUST_LINES")
          echo "rust_fmt=$RUST_FMT" >> "$GITHUB_OUTPUT"

          echo "Rust: $RUST_LINES lines across $RUST_FILES files"
          echo "ASM: $ASM_LINES lines"
          echo "Lean: $LEAN_LINES lines"
          echo "Python: $PYTHON_LINES lines"
          echo "Total: $TOTAL lines"

      - name: Update README badge
        shell: bash
        run: |
          BADGE="**${{ steps.loc.outputs.rust_fmt }} lines of Rust** across ${{ steps.loc.outputs.rust_files }} files · ${{ steps.loc.outputs.asm_lines }} lines of x86 assembly · ${{ steps.loc.outputs.lean_lines }} lines of Lean 4 proofs · ${{ steps.loc.outputs.python_lines }} lines of Python — **${{ steps.loc.outputs.total }} total**"

          sed -i '/<!-- RUST_LINE_COUNT_START -->/,/<!-- RUST_LINE_COUNT_END -->/c\<!-- RUST_LINE_COUNT_START -->\n'"$BADGE"'\n<!-- RUST_LINE_COUNT_END -->' README.md

      - name: Commit if changed
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update Rust line count [skip ci]"
          git push
