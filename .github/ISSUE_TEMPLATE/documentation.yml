name: Documentation
description: Report a documentation bug, inconsistency, or suggestion.
title: "[DOCS] "
labels: ["documentation", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Help us keep the docs accurate and approachable. Typos, unclear explanations, and missing sections are all valid issues.

  - type: dropdown
    id: doc_type
    attributes:
      label: Documentation type
      options:
        - README / root docs
        - Rustdoc (API docs)
        - Design doc (docs/design/)
        - Theorem / math doc
        - Build / run instructions
        - Security policy
        - Contributing guide
        - Other
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Location
      description: File path, URL, or crate where the issue exists.
      placeholder: e.g., docs/THEOREMS.md, kernel/seal-os/src/memory/allocator.rs rustdoc
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is wrong or missing? What did you expect instead?
    validations:
      required: true

  - type: textarea
    id: suggested_fix
    attributes:
      label: Suggested fix
      description: If you have a concrete wording or code fix in mind, paste it here.
    validations:
      required: false
