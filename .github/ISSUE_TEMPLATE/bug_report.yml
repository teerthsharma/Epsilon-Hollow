name: Bug Report
description: Report a kernel bug, driver bug, or build failure in Seal OS.
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out as much as you can.

  - type: dropdown
    id: subsystem
    attributes:
      label: Subsystem
      description: Which part of Seal OS is affected?
      options:
        - Boot / UEFI
        - Memory allocator
        - Process scheduler
        - Drivers (PCIe / NVMe / network / display)
        - ManifoldFS
        - Network stack
        - Security / Theorem gates
        - Window manager / Graphics
        - Aether-Lang runtime
        - Epsilon teleportation
        - Build / CI
        - Other
    validations:
      required: true

  - type: input
    id: qemu_version
    attributes:
      label: QEMU version
      description: Run `qemu-system-x86_64 --version` and paste the output.
      placeholder: e.g., QEMU emulator version 9.0.0
    validations:
      required: true

  - type: input
    id: host_os
    attributes:
      label: Host OS
      description: What operating system are you building / running on?
      placeholder: e.g., Windows 11, Ubuntu 24.04, macOS 15
    validations:
      required: true

  - type: input
    id: rust_version
    attributes:
      label: Rust toolchain
      description: Output of `rustc --version` and `cargo --version`.
      placeholder: e.g., rustc 1.85.0, cargo 1.85.0
    validations:
      required: true

  - type: textarea
    id: repro_steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Clone repo at commit `abc1234`
        2. Run `cargo +nightly build -p aether-kernel`
        3. Launch with `qemu-system-x86_64 ...`
        4. Observe crash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include panics, hangs, or incorrect output.
    validations:
      required: true

  - type: textarea
    id: serial_log
    attributes:
      label: Serial log snippet
      description: |
        Paste the relevant portion of the serial log (or QEMU stdout if running headless).
        If the log is long, attach a file or use a GitHub Gist.
      render: text
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I ran `cargo fmt --all` before building.
          required: false
        - label: I ran `cargo clippy --workspace --all-targets -- -D warnings` and it passes.
          required: false
        - label: I can reproduce this on the latest `main` branch.
          required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, GDB backtraces, or anything else that might help.
    validations:
      required: false
